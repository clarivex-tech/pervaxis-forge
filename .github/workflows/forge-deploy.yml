name: Deploy

on:
  push:
    branches: [main, develop]
    paths:
      - 'pervaxis-forge-api/**'
      - '.github/workflows/forge-*.yml'
  workflow_dispatch:

defaults:
  run:
    working-directory: pervaxis-forge-api

env:
  DOTNET_NOLOGO: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build-test-scan:
    name: Build · Test · SonarQube
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.x"

      - name: Setup Java 17
        if: (github.ref_name == 'main' || github.event_name == 'workflow_dispatch') && env.SONAR_TOKEN != ''
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Install SonarScanner
        if: (github.ref_name == 'main' || github.event_name == 'workflow_dispatch') && env.SONAR_TOKEN != ''
        run: dotnet tool install --global dotnet-sonarscanner

      - run: dotnet restore Pervaxis.Forge.slnx

      - name: SonarQube begin
        if: (github.ref_name == 'main' || github.event_name == 'workflow_dispatch') && env.SONAR_TOKEN != ''
        run: |
          dotnet sonarscanner begin \
            /k:"clarivex-tech_pervaxis-forge" \
            /o:"clarivex-tech" \
            /d:sonar.host.url="https://sonarcloud.io" \
            /d:sonar.token="${{ env.SONAR_TOKEN }}" \
            /d:sonar.cs.opencover.reportsPaths="**/TestResults/**/coverage.opencover.xml" \
            /d:sonar.exclusions=".github/**,**/obj/**,**/*.g.cs" \
            /d:sonar.coverage.exclusions="**/obj/**,**/*.g.cs" \
            /d:sonar.qualitygate.wait=false

      - run: dotnet build Pervaxis.Forge.slnx --no-restore --configuration Release

      - name: Test with coverage
        run: |
          dotnet test Pervaxis.Forge.slnx --no-build --configuration Release \
            --filter "Category!=Integration" \
            --collect:"XPlat Code Coverage" --results-directory TestResults \
            -- DataCollectionRunSettings.DataCollectors.DataCollect.Configuration.Format=opencover

      - name: SonarQube end
        if: (github.ref_name == 'main' || github.event_name == 'workflow_dispatch') && env.SONAR_TOKEN != ''
        run: dotnet sonarscanner end /d:sonar.token="${{ env.SONAR_TOKEN }}"

      - uses: actions/upload-artifact@v5
        if: always()
        with:
          name: deploy-test-results-${{ github.run_id }}
          path: pervaxis-forge-api/TestResults/
          retention-days: 7

  deploy-lambda:
    name: Deploy to Lambda
    needs: build-test-scan
    runs-on: ubuntu-latest
    if: github.ref_name == 'develop' || github.event_name == 'workflow_dispatch'
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.x"

      - uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Install Lambda Tools
        run: dotnet tool install --global Amazon.Lambda.Tools

      - name: Deploy to Lambda
        working-directory: pervaxis-forge-api/src/Pervaxis.Forge.Api
        run: dotnet lambda deploy-function --region us-east-1 --disable-interactive
