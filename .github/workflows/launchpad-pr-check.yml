name: Launchpad PR Check

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'pervaxis-forge-launchpad/**'
      - '.github/workflows/launchpad-*.yml'

defaults:
  run:
    working-directory: pervaxis-forge-launchpad

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: pervaxis-forge-launchpad/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npx nx build launchpad --configuration=production

  test:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: pervaxis-forge-launchpad/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npx nx test launchpad --output-style=static

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: pervaxis-forge-launchpad/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx nx lint launchpad
