name: Build and Test

on:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ main, develop ]

jobs:
  engine:
    name: Engine
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore src/Pervaxis.Forge.Engine/Pervaxis.Forge.Engine.csproj

      - name: Build
        run: dotnet build src/Pervaxis.Forge.Engine/Pervaxis.Forge.Engine.csproj --no-restore --configuration Release

      - name: Test
        run: dotnet test tests/Pervaxis.Forge.Engine.Tests/Pervaxis.Forge.Engine.Tests.csproj --no-build --configuration Release --verbosity normal --collect:"XPlat Code Coverage"

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: '**/coverage.cobertura.xml'
          flags: engine

  api:
    name: API
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: forge_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore src/Pervaxis.Forge.Api/Pervaxis.Forge.Api.csproj

      - name: Build
        run: dotnet build src/Pervaxis.Forge.Api/Pervaxis.Forge.Api.csproj --no-restore --configuration Release

      - name: Test
        run: dotnet test tests/Pervaxis.Forge.Api.Tests/Pervaxis.Forge.Api.Tests.csproj --no-build --configuration Release --verbosity normal --collect:"XPlat Code Coverage"
        env:
          ConnectionStrings__ForgeDb: "Host=localhost;Database=forge_test;Username=postgres;Password=postgres"

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: '**/coverage.cobertura.xml'
          flags: api
