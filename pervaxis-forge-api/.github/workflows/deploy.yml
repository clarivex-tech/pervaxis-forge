name: Deploy

on:
  push:
    branches: [ main ]

defaults:
  run:
    working-directory: pervaxis-forge-api

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: >
          dotnet test
          --no-build
          --configuration Release
          --verbosity normal
          --collect:"XPlat Code Coverage"
          --filter "Category!=Integration"

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: '**/coverage.cobertura.xml'
          flags: deploy

      # TODO(sonar): add SonarCloud scan step here once SONAR_TOKEN is provisioned

  # TODO: add deploy job here (ECS task update / ECR push) once infra is provisioned
