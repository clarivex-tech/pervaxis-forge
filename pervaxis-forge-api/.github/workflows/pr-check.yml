name: PR Check

on:
  pull_request:
    branches: [ main, develop ]

defaults:
  run:
    working-directory: pervaxis-forge-api

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test (unit + non-DB tests)
        run: >
          dotnet test
          --no-build
          --configuration Release
          --verbosity normal
          --collect:"XPlat Code Coverage"
          --filter "Category!=Integration"
        env:
          # DB-dependent tests are gated by this var — unset = skip.
          # Set to any non-empty value in a real-RDS environment to run integration tests.
          RUN_INTEGRATION_TESTS: ""

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: '**/coverage.cobertura.xml'
          flags: unit

      # TODO(sonar): add SonarCloud scan step here once SONAR_TOKEN is provisioned
      # org: clarivex-tech  project: clarivex-tech_pervaxis-forge
